<!DOCTYPE html>
<html>
<head>
<title>My Exams</title>

<style>

body{
background-color:lightgreen;
font-family:Arial;
text-align:center;
margin:0;
}

.container{
width:70%;
margin:40px auto;
background-color:green;
padding:30px;
border-radius:20px;
}

h1{
color:white;
}

.exam-grid{
display:flex;
justify-content:center;
gap:40px;
margin-top:30px;
}

.exam-card{
background-color:#2e8b57;
padding:15px;
border-radius:15px;
width:220px;
transition:0.3s;
}

.exam-card:hover{
transform:scale(1.05);
background-color:#3cb371;
}

.exam-card img{
width:100%;
border-radius:10px;
}

.exam-title{
margin-top:10px;
color:white;
font-weight:bold;
}

.back-btn{
display:inline-block;
margin-top:35px;
padding:10px 25px;
background-color:white;
color:green;
text-decoration:none;
border-radius:20px;
font-weight:bold;
}

.back-btn:hover{
background-color:#e6ffe6;
}

</style>

</head>

<body>

<div class="container">

<h1>My Exams</h1>

<div class="exam-grid">

<div class="exam-card">
<a href="midterm.html">
<img src="midterm.jpg">
</a>
<div class="exam-title">Midterm Exam</div>
</div>

<div class="exam-card">
<a href="final.html">
<img src="final.jpg">
</a>
<div class="exam-title">Final Exam</div>
</div>

</div>

<a href="index.html" class="back-btn">Back</a>

</div>

</body>
</html>
